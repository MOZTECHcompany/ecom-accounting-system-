name: Deploy Backend to Cloud Run

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'moztech-main-db' }}
  GCP_REGION: ${{ secrets.GCP_REGION || 'asia-east1' }}
  ARTIFACT_REPOSITORY: ${{ vars.CLOUD_RUN_ARTIFACT_REPOSITORY || 'cloud-run' }}
  BACKEND_SERVICE: ${{ secrets.CLOUD_RUN_BACKEND_SERVICE || secrets.CLOUD_RUN_SERVICE || 'ecom-accounting-backend' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Recommended: Workload Identity Federation (no JSON key in GitHub)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and deploy backend
        id: deploy
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/${BACKEND_SERVICE}:${GITHUB_SHA}"

          gcloud artifacts repositories describe "${ARTIFACT_REPOSITORY}" \
            --project="${GCP_PROJECT_ID}" \
            --location="${GCP_REGION}" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "${ARTIFACT_REPOSITORY}" \
            --project="${GCP_PROJECT_ID}" \
            --repository-format=docker \
            --location="${GCP_REGION}" \
            --description="Cloud Run containers for ecom-accounting-system"

          gcloud builds submit backend \
            --project="${GCP_PROJECT_ID}" \
            --tag="${IMAGE}"

          gcloud run deploy "${BACKEND_SERVICE}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --image="${IMAGE}" \
            --allow-unauthenticated \
            --port=3000

          URL="$(gcloud run services describe "${BACKEND_SERVICE}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --format='value(status.url)')"
          echo "url=${URL}" >> "${GITHUB_OUTPUT}"

      - name: Show service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
